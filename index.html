<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Tracking — Timber 360</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep:  #0d3b1e;
  --green-mid:   #166534;
  --green-bright:#22c55e;
  --green-pale:  #dcfce7;
  --slate:       #64748b;
  --border:      #e2e8f0;
  --bg:          #f0f4f0;
  --white:       #ffffff;
  --text:        #0f172a;
  --text-soft:   #475569;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 60% at 50% -10%, rgba(22,101,52,0.12) 0%, transparent 70%),
    url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Ccircle cx='20' cy='20' r='1' fill='%2322c55e' fill-opacity='0.07'/%3E%3C/g%3E%3C/svg%3E");
}

/* ── HEADER ───────────────────────────── */
.top-bar {
  text-align: center;
  padding: 36px 20px 0;
  animation: fadeDown 0.6s ease both;
}
.brand-logo {
  width: 52px; height: 52px;
  background: var(--green-mid);
  border-radius: 14px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 10px;
  box-shadow: 0 4px 20px rgba(22,101,52,0.3);
}
.brand-name {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--green-mid);
  display: block;
}

/* ── MAIN CARD ────────────────────────── */
.container {
  max-width: 440px;
  margin: 0 auto;
  padding: 20px 16px 60px;
}

.card {
  background: var(--white);
  border-radius: 20px;
  padding: 24px;
  margin-bottom: 12px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
  animation: riseUp 0.5s ease both;
}
.card:nth-child(1) { animation-delay: 0.1s; }
.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.3s; }
.card:nth-child(4) { animation-delay: 0.4s; }

.card-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--slate);
  margin-bottom: 14px;
}

/* ── BIZ HEADER CARD ──────────────────── */
.biz-card {
  background: var(--green-deep);
  color: #fff;
  border: none;
  position: relative;
  overflow: hidden;
}
.biz-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(34,197,94,0.08);
}
.biz-card::after {
  content: '';
  position: absolute;
  bottom: -30px; left: -20px;
  width: 100px; height: 100px;
  border-radius: 50%;
  background: rgba(34,197,94,0.05);
}
.biz-name {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 4px;
}
.biz-sub {
  font-size: 12px;
  opacity: 0.6;
  letter-spacing: 0.04em;
}
.inv-badge {
  display: inline-block;
  margin-top: 14px;
  background: rgba(34,197,94,0.15);
  border: 1px solid rgba(34,197,94,0.3);
  color: var(--green-bright);
  padding: 5px 12px;
  border-radius: 30px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
}

/* ── STATUS CARD ──────────────────────── */
.status-pill {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  border-radius: 14px;
}
.status-icon { font-size: 34px; line-height: 1; }
.status-label {
  font-family: 'Syne', sans-serif;
  font-size: 19px;
  font-weight: 800;
  line-height: 1.2;
}
.status-sub {
  font-size: 12px;
  opacity: 0.7;
  margin-top: 3px;
}

/* ── INFO ROWS ────────────────────────── */
.info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  border-bottom: 1px solid #f1f5f9;
  font-size: 13px;
}
.info-row:last-child { border: none; padding-bottom: 0; }
.info-key { color: var(--text-soft); font-weight: 400; }
.info-val { font-weight: 600; text-align: right; max-width: 60%; }

/* ── TIMELINE ─────────────────────────── */
.timeline { position: relative; }
.tl-item {
  display: flex;
  gap: 14px;
  margin-bottom: 20px;
  position: relative;
}
.tl-item:last-child { margin-bottom: 0; }
.tl-left {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 14px;
  flex-shrink: 0;
}
.tl-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
}
.tl-line {
  width: 2px;
  flex: 1;
  background: var(--border);
  margin-top: 4px;
  min-height: 20px;
}
.tl-item:last-child .tl-line { display: none; }
.tl-title {
  font-weight: 700;
  font-size: 14px;
  line-height: 1.3;
}
.tl-note {
  font-size: 12px;
  color: var(--text-soft);
  margin-top: 3px;
  font-style: italic;
}
.tl-time {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 4px;
}

/* ── EXPIRED ──────────────────────────── */
.expired-box {
  text-align: center;
  padding: 20px;
  background: #fff5f5;
  border-radius: 14px;
  border: 1px solid #fecaca;
}
.expired-box .exp-icon { font-size: 32px; margin-bottom: 8px; }
.expired-box .exp-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 800;
  color: #991b1b;
}
.expired-box .exp-sub {
  font-size: 12px;
  color: #b91c1c;
  margin-top: 4px;
  opacity: 0.8;
}

/* ── LOADING / ERROR ──────────────────── */
.loading-box {
  text-align: center;
  padding: 60px 20px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--green-mid);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
.loading-text {
  font-size: 14px;
  color: var(--slate);
  font-weight: 500;
}
.error-box {
  text-align: center;
  padding: 50px 20px;
}
.error-icon { font-size: 40px; margin-bottom: 12px; }
.error-title {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 800;
  color: #dc2626;
  margin-bottom: 6px;
}
.error-sub { font-size: 12px; color: var(--slate); }

/* ── FOOTER ───────────────────────────── */
.footer {
  text-align: center;
  padding: 0 20px 32px;
  font-size: 11px;
  color: #94a3b8;
  animation: fadeDown 1s ease 0.5s both;
}
.footer strong { color: var(--green-mid); }

/* ── ANIMATIONS ───────────────────────── */
@keyframes fadeDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes riseUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>
<body>

<div class="top-bar">
  <div class="brand-logo">🌲</div>
  <span class="brand-name">Timber 360</span>
</div>

<div class="container">
  <div id="app">
    <div class="card">
      <div class="loading-box">
        <div class="spinner"></div>
        <div class="loading-text">Loading your order...</div>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  Powered by <strong>Timber 360</strong> &nbsp;•&nbsp; Order Tracking System
</div>

<script>
const STATUS_META = {
  pending:    { icon:'📥', label:'Order Received',    color:'#475569', bg:'#f8fafc' },
  processing: { icon:'⚙️',  label:'In Production',     color:'#d97706', bg:'#fffbeb' },
  ready:      { icon:'✅', label:'Ready',              color:'#0891b2', bg:'#ecfeff' },
  dispatched: { icon:'🚚', label:'Dispatched',         color:'#7c3aed', bg:'#f5f3ff' },
  delivered:  { icon:'🏠', label:'Delivered',          color:'#16a34a', bg:'#f0fdf4' },
  closed:     { icon:'🔒', label:'Delivered & Closed', color:'#166534', bg:'#dcfce7' },
};

function fmt(ts) {
  try {
    return new Date(parseInt(ts)).toLocaleDateString('en-PK', {
      year:'numeric', month:'short', day:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  } catch { return '—'; }
}

function fmtDate(ts) {
  try {
    return new Date(parseInt(ts)).toLocaleDateString('en-PK', {
      year:'numeric', month:'short', day:'numeric'
    });
  } catch { return '—'; }
}

async function load() {
  const params = new URLSearchParams(location.search);
  const token  = params.get('t');   // نیا token-based
  const legacyId = params.get('id'); // پرانا id-based fallback

  if (!token && !legacyId) {
    showError('Invalid tracking link', 'Please scan the QR code again.');
    return;
  }

  const PROJECT = 'timber-360';
  const BASE    = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

  let json = null;

  try {
    if (token) {
      // نیا: document ID = token
      const res = await fetch(`${BASE}/tracking/${token}`);
      if (res.ok) json = await res.json();
    }

    if (!json && legacyId) {
      // پرانا fallback: document ID = invoiceId
      const res = await fetch(`${BASE}/tracking/${legacyId}`);
      if (res.ok) json = await res.json();
    }

    if (!json) throw new Error('not found');

    const f   = json.fields || {};
    const get = k => f[k]?.stringValue ?? f[k]?.integerValue ?? '';
    const getArr = k => {
      try {
        return (f[k]?.arrayValue?.values || []).map(v => {
          const m = v.mapValue?.fields || {};
          return {
            status: m.status?.stringValue || '',
            note:   m.note?.stringValue   || '',
            time:   m.time?.stringValue    || '',
          };
        });
      } catch { return []; }
    };

    const status  = get('status') || 'pending';
    const sm      = STATUS_META[status] || STATUS_META.pending;
    const history = getArr('statusHistory');
    const expAt   = get('expiresAt');
    const isExp   = expAt && new Date(parseInt(expAt)) < new Date();
    const bizName = get('bizName') || 'Timber 360';
    const bizPhone= get('bizPhone');
    const invId   = get('invoiceId');
    const custName= get('customerName');
    const created = get('createdAt');

    let html = '';

    // ── Biz header card
    html += `
    <div class="card biz-card">
      <div class="card-label" style="color:rgba(255,255,255,0.45)">Order Tracking</div>
      <div class="biz-name">${escHtml(bizName)}</div>
      ${bizPhone ? `<div class="biz-sub">📞 ${escHtml(bizPhone)}</div>` : ''}
      <div class="inv-badge">Invoice # ${escHtml(invId)}</div>
    </div>`;

    // ── Status card
    if (isExp) {
      html += `
      <div class="card">
        <div class="expired-box">
          <div class="exp-icon">🔒</div>
          <div class="exp-title">Order Completed</div>
          <div class="exp-sub">This tracking link has expired.</div>
        </div>
      </div>`;
    } else {
      html += `
      <div class="card">
        <div class="card-label">Current Status</div>
        <div class="status-pill" style="background:${sm.bg}">
          <span class="status-icon">${sm.icon}</span>
          <div>
            <div class="status-label" style="color:${sm.color}">${sm.label}</div>
            <div class="status-sub" style="color:${sm.color}">Updated ${fmtDate(history.length ? history[history.length-1].time : created)}</div>
          </div>
        </div>
      </div>`;
    }

    // ── Info card
    html += `
    <div class="card">
      <div class="card-label">Order Details</div>
      ${custName ? `<div class="info-row"><span class="info-key">Customer</span><span class="info-val">${escHtml(custName)}</span></div>` : ''}
      <div class="info-row"><span class="info-key">Invoice #</span><span class="info-val">${escHtml(invId)}</span></div>
      <div class="info-row"><span class="info-key">Order Date</span><span class="info-val">${fmtDate(created)}</span></div>
      <div class="info-row"><span class="info-key">Tracking ID</span><span class="info-val" style="font-size:11px;color:#94a3b8;word-break:break-all">${escHtml(token || legacyId)}</span></div>
    </div>`;

    // ── Timeline card
    if (history.length > 0) {
      html += `<div class="card"><div class="card-label">Status History</div><div class="timeline">`;
      [...history].reverse().forEach((h, i) => {
        const m = STATUS_META[h.status] || STATUS_META.pending;
        html += `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-dot" style="background:${m.color}"></div>
            <div class="tl-line"></div>
          </div>
          <div style="flex:1;padding-bottom:4px">
            <div class="tl-title" style="color:${m.color}">${m.icon} ${m.label}</div>
            ${h.note ? `<div class="tl-note">"${escHtml(h.note)}"</div>` : ''}
            <div class="tl-time">${fmt(h.time)}</div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    }

    document.getElementById('app').innerHTML = html;

  } catch(e) {
    showError('Tracking info not found', `Order #${escHtml(token || legacyId || '?')}`);
  }
}

function showError(title, sub) {
  document.getElementById('app').innerHTML = `
  <div class="card">
    <div class="error-box">
      <div class="error-icon">📭</div>
      <div class="error-title">${title}</div>
      <div class="error-sub">${sub}</div>
    </div>
  </div>`;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

load();
</script>
</body>
</html>
